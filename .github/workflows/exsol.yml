name: create dx solution 

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  paket-update:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x' # Adjust to match your SDK version

      - name: Restore Local Tools
        run: dotnet new install DevExpress.XAF.ProjectTemplates::24.2.14

      - name: create solution 
        run: dotnet new dx.xaf -p Win -e2e --framework net9.0 --type solution -db Sqlite -orm XPO -s MiddleTier -n ClinicManager
       
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Branch Configuration
          branch: feature/paket-update
          delete-branch: true
          
          # PR Content
          title: "Paket Dependency Update"
          body: |
            ## Manual Update Triggered
            
            This update was triggered manually by @${{ github.actor }}.
            
            **Changes:**
            - `paket.lock` (Updated versions)
            - `paket.references` (If applicable)
            
          # COMMIT IDENTITY CONFIGURATION
          # This maps the commit to the user who pressed the button
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          committer: GitHub <noreply@github.com>
          commit-message: "chore(deps): update paket dependencies"
          
          # Labels
          labels: |
            dependencies
            manual-trigger
