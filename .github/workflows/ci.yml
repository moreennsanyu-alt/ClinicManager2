name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and UI Test
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.200
      
    - name: 'Cache: .nuke/temp, ~/.nuget/packages'
      uses: actions/cache@v4
      with:
        path: |
          .nuke/temp
          ~/.nuget/packages
        key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}
    
    - name: Minimize windows
      shell: powershell
      run: (New-Object -ComObject Shell.Application).MinimizeAll()

     
    - name: Run NUKE
      run: ./build.ps1

    - name: Create Test Report
      uses: icsharpcode/test-summary-action@dist
      if: always()
      with:
        paths: "artifacts/**/*.trx"
     

    # 6. Upload Artifacts
    # Uses 'if: always()' so logs are uploaded even if the build/test fails
    - name: Upload Build and Test Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-and-test-logs
        path: |
          Artifacts/Attachments/
          Artifacts/bin/**/*.png
          Artifacts/bin/**/*.avi
        retention-days: 5
